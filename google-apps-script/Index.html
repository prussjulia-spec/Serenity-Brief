<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Брифы Serenity</title>
  <style>:root {
  --black: #151516;
  --panel: #1d1d1f;
  --panel-soft: #252527;
  --white: #f7f7f5;
  --paper: #ffffff;
  --ink: #171719;
  --muted: #8d8d92;
  --line: rgba(255, 255, 255, 0.12);
  --paper-line: #e7e7e9;
  --purple: #7655ff;
  --pink: #dc657d;
  --green: #63d79b;
  --radius: 30px;
  --radius-sm: 18px;
  --shadow: 0 24px 80px rgba(0, 0, 0, 0.28);
}

* {
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  min-height: 100vh;
  margin: 0;
  overflow-x: hidden;
  background: var(--black);
  color: var(--white);
  font-family: MuseoSansCyrl, Inter, system-ui, -apple-system, "Segoe UI", sans-serif;
  font-weight: 300;
}

button,
input,
textarea,
select {
  font: inherit;
}

button {
  color: inherit;
}

.ambient {
  position: fixed;
  z-index: -1;
  width: 44vw;
  height: 54vw;
  border-radius: 50%;
  opacity: 0.52;
  filter: blur(92px);
  pointer-events: none;
}

.ambient-left {
  top: -25vw;
  left: -24vw;
  background: #d96478;
}

.ambient-right {
  top: -19vw;
  right: -24vw;
  background: #6550e9;
}

.topbar,
.footer {
  width: min(1220px, calc(100% - 40px));
  margin: 0 auto;
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  min-height: 96px;
}

.brand {
  padding: 0;
  border: 0;
  background: none;
  font-size: 34px;
  font-weight: 600;
  letter-spacing: -1.7px;
  cursor: pointer;
}

.topbar-meta {
  display: flex;
  align-items: center;
  gap: 24px;
  color: #bdbdc1;
  font-size: 14px;
}

.autosave {
  display: inline-flex;
  flex: 0 0 auto;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
}

.autosave[hidden] {
  display: none;
}

.autosave i {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 14px rgba(99, 215, 155, 0.8);
}

.autosave.sending i {
  background: #f0c56d;
  box-shadow: 0 0 14px rgba(240, 197, 109, 0.8);
}

.autosave.error i {
  background: var(--pink);
  box-shadow: 0 0 14px rgba(220, 101, 125, 0.8);
}

#app {
  width: min(1220px, calc(100% - 40px));
  min-height: calc(100vh - 190px);
  margin: 0 auto;
}

.hero {
  padding: 46px 0 42px;
  text-align: center;
}

.hero-kicker {
  margin: 0 0 22px;
  color: #aaaab0;
  font-size: 15px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.hero h1 {
  max-width: 1080px;
  margin: 0 auto;
  font-size: clamp(46px, 5.6vw, 72px);
  font-weight: 400;
  line-height: 0.96;
  letter-spacing: -0.065em;
  text-wrap: balance;
}

.hero-copy {
  max-width: 620px;
  margin: 20px auto 0;
  color: #d2d2d5;
  font-size: 19px;
  line-height: 1.45;
  text-wrap: balance;
}

.catalog {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 16px;
  padding-bottom: 70px;
}

.catalog-hint {
  display: block;
  margin: 0 auto 16px;
  padding: 10px 16px;
  border: 1px solid var(--line);
  border-radius: 99px;
  background: rgba(29, 29, 31, 0.62);
  color: #c8c8cc;
  cursor: pointer;
  transition: background 180ms ease, border-color 180ms ease;
}

.catalog-hint:hover {
  border-color: rgba(255, 255, 255, 0.28);
  background: rgba(38, 38, 41, 0.82);
}

.brief-card {
  min-height: 198px;
  padding: 26px 28px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: rgba(29, 29, 31, 0.76);
  box-shadow: var(--shadow);
  text-align: left;
  cursor: pointer;
  transition: transform 180ms ease, background 180ms ease, border-color 180ms ease;
  backdrop-filter: blur(18px);
}

.brief-card:hover {
  transform: translateY(-4px);
  border-color: rgba(255, 255, 255, 0.32);
  background: rgba(38, 38, 41, 0.92);
}

.brief-card-top,
.brief-card-bottom,
.form-head,
.form-actions,
.result-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 18px;
}

.tag {
  color: #a6a6ab;
  font-size: 13px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.card-category {
  color: #b2b2b7;
  font-size: 11px;
  letter-spacing: 0.07em;
  text-transform: uppercase;
}

.time {
  color: #98989d;
  font-size: 12px;
  letter-spacing: 0.03em;
}

.brief-card-top {
  justify-content: space-between;
}

.brief-card h2 {
  max-width: 500px;
  margin: 30px 0 18px;
  font-size: clamp(26px, 3.2vw, 43px);
  font-weight: 400;
  line-height: 1.04;
  letter-spacing: -0.045em;
}

.brief-card p {
  max-width: 520px;
  margin: 0;
  color: #a6a6ab;
  font-size: 16px;
  line-height: 1.45;
}

.arrow,
.round-button {
  display: grid;
  flex: 0 0 auto;
  place-items: center;
  width: 46px;
  height: 46px;
  border: 1px solid rgba(255, 255, 255, 0.22);
  border-radius: 50%;
  font-size: 21px;
}

.brief-shell {
  display: grid;
  grid-template-columns: 280px minmax(0, 1fr);
  gap: 18px;
  padding: 34px 0 70px;
}

.brief-aside {
  position: sticky;
  top: 24px;
  align-self: start;
  padding: 26px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: rgba(29, 29, 31, 0.84);
  backdrop-filter: blur(18px);
}

.back-link {
  display: inline-flex;
  gap: 10px;
  padding: 0;
  border: 0;
  background: none;
  color: #bebec2;
  cursor: pointer;
}

.brief-aside h2 {
  margin: 56px 0 14px;
  font-size: 34px;
  font-weight: 400;
  line-height: 1.06;
  letter-spacing: -0.045em;
}

.brief-aside p {
  margin: 0 0 32px;
  color: #96969b;
  line-height: 1.5;
}

.aside-time {
  display: inline-block;
  margin: -16px 0 30px;
  color: #bdbdc1;
  font-size: 13px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.progress-label {
  display: flex;
  justify-content: space-between;
  margin-bottom: 9px;
  color: #b9b9bd;
  font-size: 13px;
}

.progress {
  height: 5px;
  overflow: hidden;
  border-radius: 99px;
  background: #39393d;
}

.progress span {
  display: block;
  height: 100%;
  border-radius: inherit;
  background: linear-gradient(90deg, var(--pink), var(--purple));
  transition: width 180ms ease;
}

.section-nav {
  display: grid;
  gap: 8px;
  margin-top: 36px;
}

.section-nav button {
  padding: 11px 0;
  border: 0;
  background: none;
  color: #77777d;
  text-align: left;
  cursor: pointer;
}

.section-nav button.active,
.section-nav button:hover {
  color: var(--white);
}

.brief-form {
  padding: 42px;
  border-radius: var(--radius);
  background: var(--paper);
  box-shadow: var(--shadow);
  color: var(--ink);
}

.honeypot {
  position: absolute !important;
  width: 1px !important;
  height: 1px !important;
  overflow: hidden !important;
  opacity: 0 !important;
  pointer-events: none !important;
}

.form-head {
  padding-bottom: 26px;
  border-bottom: 1px solid var(--paper-line);
}

.form-head h1 {
  margin: 0;
  font-size: clamp(34px, 5vw, 58px);
  font-weight: 400;
  line-height: 1;
  letter-spacing: -0.055em;
}

.form-head p {
  max-width: 310px;
  margin: 0;
  color: #77777d;
  line-height: 1.45;
}

.form-section {
  padding: 42px 0 10px;
}

.section-title {
  display: grid;
  grid-template-columns: 52px minmax(0, 1fr);
  gap: 14px;
  align-items: start;
  margin-bottom: 30px;
}

.section-title span {
  color: #a0a0a5;
  font-size: 14px;
}

.section-title h2 {
  margin: 0;
  font-size: 29px;
  font-weight: 400;
  letter-spacing: -0.035em;
}

.fields {
  display: grid;
  gap: 23px;
}

.field label,
.field legend {
  display: block;
  margin-bottom: 10px;
  font-size: 16px;
  font-weight: 400;
}

.field small {
  display: block;
  margin: -4px 0 11px;
  color: #929298;
  line-height: 1.4;
}

.field input,
.field textarea,
.field select {
  width: 100%;
  border: 1px solid #dedee1;
  border-radius: var(--radius-sm);
  outline: 0;
  background: #f8f8f8;
  color: var(--ink);
  transition: border-color 160ms ease, box-shadow 160ms ease, background 160ms ease;
}

.field input,
.field select {
  min-height: 56px;
  padding: 0 17px;
}

.field textarea {
  min-height: 116px;
  padding: 16px 17px;
  resize: vertical;
}

.field input:focus,
.field textarea:focus,
.field select:focus {
  border-color: #8a70f0;
  background: #fff;
  box-shadow: 0 0 0 4px rgba(118, 85, 255, 0.12);
}

.field input:user-invalid,
.field textarea:user-invalid {
  border-color: #c76378;
  background: #fff8f9;
}

.choice-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.choice {
  position: relative;
}

.choice input {
  position: absolute;
  opacity: 0;
  pointer-events: none;
}

.choice span {
  display: block;
  padding: 11px 15px;
  border: 1px solid #dedee1;
  border-radius: 99px;
  color: #68686e;
  cursor: pointer;
  transition: all 160ms ease;
}

.choice input:checked + span {
  border-color: var(--ink);
  background: var(--ink);
  color: #fff;
}

.choice input:focus-visible + span,
button:focus-visible,
a:focus-visible {
  outline: 3px solid rgba(118, 85, 255, 0.45);
  outline-offset: 3px;
}

.required {
  color: #a4485d;
}

.form-actions {
  margin-top: 34px;
  padding-top: 28px;
  border-top: 1px solid var(--paper-line);
}

.consent {
  display: grid;
  grid-template-columns: 22px minmax(0, 1fr);
  gap: 12px;
  align-items: start;
  margin-top: 38px;
  padding: 18px;
  border: 1px solid var(--paper-line);
  border-radius: 18px;
  background: #f8f8f8;
  color: #57575c;
  font-size: 14px;
  line-height: 1.5;
}

.consent input {
  width: 18px;
  height: 18px;
  margin: 2px 0 0;
  accent-color: var(--purple);
}

.consent a {
  display: inline-block;
  margin-left: 4px;
  color: var(--ink);
  font-weight: 500;
}

.policy-placeholder {
  display: block;
  margin-top: 4px;
  color: #8d8d92;
}

.form-note {
  max-width: 600px;
  margin: 15px 0 0;
  color: #929298;
  font-size: 13px;
  line-height: 1.45;
}

.form-error {
  margin: 18px 0 0;
  padding: 14px 16px;
  border: 1px solid #efc9d1;
  border-radius: 14px;
  background: #fff4f6;
  color: #8e3347;
  line-height: 1.45;
}

.button {
  min-height: 54px;
  padding: 0 22px;
  border: 1px solid var(--ink);
  border-radius: 99px;
  background: var(--ink);
  color: #fff;
  cursor: pointer;
  transition: transform 160ms ease, opacity 160ms ease;
}

.button:hover {
  transform: translateY(-2px);
}

.button:disabled {
  cursor: wait;
  opacity: 0.6;
  transform: none;
}

.button.secondary {
  border-color: #d6d6d9;
  background: transparent;
  color: var(--ink);
}

.result {
  padding: 34px 0 70px;
}

.result-card {
  padding: 42px;
  border-radius: var(--radius);
  background: var(--paper);
  box-shadow: var(--shadow);
  color: var(--ink);
}

.result-head {
  margin-bottom: 34px;
}

.result-head h1 {
  margin: 0;
  font-size: clamp(38px, 6vw, 70px);
  font-weight: 400;
  letter-spacing: -0.06em;
}

.result-copy {
  max-width: 560px;
  margin: 20px 0 0;
  color: #77777d;
  font-size: 18px;
  line-height: 1.5;
}

.result-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.summary-section {
  padding: 28px 0;
  border-top: 1px solid var(--paper-line);
}

.summary-section h2 {
  margin: 0 0 18px;
  font-size: 24px;
  font-weight: 400;
}

.summary-item {
  display: grid;
  grid-template-columns: 36% minmax(0, 1fr);
  gap: 20px;
  padding: 11px 0;
}

.summary-item dt {
  color: #85858a;
}

.summary-item dd {
  margin: 0;
  white-space: pre-wrap;
}

.empty {
  color: #aaaab0;
  font-style: italic;
}

.footer {
  display: flex;
  justify-content: space-between;
  padding: 30px 0 42px;
  border-top: 1px solid var(--line);
  color: #7f7f84;
  font-size: 14px;
}

.footer a {
  color: #bcbcc0;
  text-decoration: none;
}

@media (max-width: 920px) {
  .catalog,
  .brief-shell {
    grid-template-columns: 1fr;
  }

  .brief-aside {
    position: static;
  }

  .section-nav {
    display: none;
  }

  .brief-aside h2 {
    margin-top: 34px;
  }

  .form-head {
    display: block;
  }

  .form-head p {
    margin-top: 15px;
  }
}

@media (max-width: 640px) {
  .topbar,
  .footer,
  #app {
    width: min(100% - 24px, 1220px);
  }

  .hero {
    padding: 30px 0 34px;
  }

  .hero h1 {
    max-width: 470px;
    font-size: clamp(31px, 9.8vw, 39px);
    line-height: 1;
  }

  .hero-copy {
    max-width: 520px;
    margin-top: 18px;
    font-size: 17px;
  }

  .brief-card {
    min-height: 185px;
    padding: 22px;
  }

  .catalog-hint {
    width: 100%;
    margin-bottom: 12px;
    font-size: 13px;
  }

  .brief-card-top {
    align-items: flex-start;
  }

  .time {
    max-width: none;
    white-space: nowrap;
    text-align: right;
    font-size: 10px;
  }

  .brief-card h2 {
    margin: 24px 0 14px;
  }

  .single-choice .choice-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 6px;
  }

  .single-choice .choice:last-child {
    grid-column: 1 / -1;
  }

  .single-choice .choice span {
    display: flex;
    align-items: center;
    min-height: 48px;
    padding: 8px 11px;
    border-radius: 14px;
    font-size: 13px;
    line-height: 1.35;
  }

  .brief-aside {
    padding: 22px;
  }

  .brief-aside h2 {
    margin-top: 28px;
  }

  .brief-aside p {
    margin-bottom: 24px;
  }

  .aside-time {
    margin-bottom: 24px;
  }

  .brief-form,
  .result-card {
    padding: 24px;
    border-radius: 24px;
  }

  .form-head h1 {
    font-size: 39px;
  }

  .section-title {
    grid-template-columns: 1fr;
  }

  .summary-item {
    grid-template-columns: 1fr;
    gap: 5px;
  }

  .form-actions,
  .result-head,
  .footer {
    align-items: flex-start;
    flex-direction: column;
  }

  .form-actions .button,
  .result-actions,
  .result-actions .button {
    width: 100%;
  }

  .topbar {
    min-height: 78px;
  }

  .brand {
    font-size: 28px;
  }

  .autosave {
    font-size: 11.5px;
    text-align: right;
  }
}
</style>
</head>

const app = document.querySelector("#app");
const saveStatus = document.querySelector("#save-status");
const requestedBriefId = new URLSearchParams(window.location.search).get("brief");

if (briefTypes.some((item) => item.id === requestedBriefId)) {
  state.briefId = requestedBriefId;
  state.screen = "brief";
}

function field(id, label, type = "text", help = "", required = false) {
  return { id, label, type, help, required };
}

function choice(id, label, options, required = false) {
  return { id, label, type: "choice", options, required };
}

function singleChoice(id, label, options, help = "", required = false) {
  return { id, label, type: "singleChoice", options, help, required };
}

function section(title, fields) {
  return { title, fields };
}

function brief(id, title, description, time, sections) {
  return { id, title, description, time, sections: [...sections, finalSection] };
}

function formatTime(time) {
  return `Заполнение: ${time.replace("≈ ", "около ")}`;
}

function formatCompactTime(time) {
  return time.replace("≈ ", "Около ");
}

function getBriefIntro(briefItem) {
  if (briefItem.id === "primary") return "Коротко опишите задачу — мы предложим следующий шаг.";
  return briefItem.description.match(/^.*?[.!?](?=\s|$)/)?.[0] || briefItem.description;
}

function render() {
  saveStatus.hidden = state.screen === "home";
  if (state.screen === "brief") return renderBrief();
  if (state.screen === "result") return renderResult();
  renderHome();
}

      <p class="hero-copy">Выберите подходящий бриф.</p>
    </section>
    <button class="catalog-hint" type="button" data-brief="primary">Не знаете, что выбрать? Начните с первичного брифа →</button>
    <section class="catalog">
      ${briefTypes.map((item) => `
        <button class="brief-card" type="button" data-brief="${item.id}">
          <div class="brief-card-top">
            <span class="card-category">${briefCategories[item.id]}</span>
            <span class="time">${formatTime(item.time)}</span>
          </div>
          <h2>${item.title}</h2>
          <div class="brief-card-bottom">
            <p>${item.description}</p>
            <span class="arrow">→</span>
          </div>
        </button>
      `).join("")}
    </section>
  `;
}

function renderBrief() {
  const current = getCurrentBrief();
  const progress = getRequiredProgress();

  app.innerHTML = `
    <div class="brief-shell">
      <aside class="brief-aside">
        <button class="back-link" type="button" data-action="home">← Все брифы</button>
        <h2>${current.title}</h2>
        <p>${getBriefIntro(current)}</p>
        <span class="aside-time">${formatCompactTime(current.time)}</span>
        <div class="progress-label"><span>Обязательные ответы</span><strong>${progress}%</strong></div>
        <div class="progress"><span style="width:${progress}%"></span></div>
        <nav class="section-nav">
          ${current.sections.map((item, index) => `<button type="button" data-scroll="section-${index}">${String(index + 1).padStart(2, "0")} · ${item.title}</button>`).join("")}
        </nav>
      </aside>

      <form class="brief-form" id="brief-form">
        <input class="honeypot" type="text" name="company_site_confirm" tabindex="-1" autocomplete="off">
        <div class="form-head">
          <h1>Расскажите<br>о проекте</h1>
          <p>Можно отвечать коротко. Поля со звездочкой обязательны, остальные можно пропустить.</p>
        </div>
        ${current.sections.map((item, sectionIndex) => `
          <section class="form-section" id="section-${sectionIndex}">
            <div class="section-title">
              <span>${String(sectionIndex + 1).padStart(2, "0")}</span>
              <h2>${item.title}</h2>
            </div>
            <div class="fields">
              ${item.fields.map(renderField).join("")}
            </div>
          </section>
        `).join("")}
        <label class="consent">
          <input type="checkbox" name="privacy_consent" value="accepted" required>
          <span>
            Я согласен(на) на обработку персональных данных для подготовки предложения.
            ${publicConfig.privacyPolicyUrl
              ? `<a href="${escapeHtml(publicConfig.privacyPolicyUrl)}" target="_blank" rel="noreferrer">Политика обработки данных</a>`
              : `<span class="policy-placeholder">Ссылка на политику будет добавлена после публикации документа.</span>`}
          </span>
        </label>
        <div class="form-actions">
          <button class="button secondary" type="button" data-action="clear">Очистить ответы</button>
          <button class="button" type="submit" ${state.sending ? "disabled" : ""}>${state.sending ? "Отправляем…" : "Отправить бриф →"}</button>
        </div>
        ${state.error ? `<p class="form-error" role="alert">${escapeHtml(state.error)}</p>` : ""}
        <p class="form-note">Данные попадут только в рабочий реестр Serenity и документ с ответами.</p>
      </form>
    </div>
  `;
  fillAnswers();
}

function renderField(item) {
  const required = item.required ? ` <span class="required">*</span>` : "";
  const helpId = `${item.id}-help`;
  const help = item.help ? `<small id="${helpId}">${item.help}</small>` : "";
  const describedBy = item.help ? ` aria-describedby="${helpId}"` : "";
  if (item.type === "choice" || item.type === "singleChoice") {
    const inputType = item.type === "singleChoice" ? "radio" : "checkbox";
    const nativeRequired = item.type === "singleChoice" && item.required ? " required" : "";
    return `
      <fieldset class="field ${item.type === "singleChoice" ? "single-choice" : "multi-choice"}"${item.required ? ' aria-required="true"' : ""}>
        <legend>${item.label}${required}</legend>
        ${help}
        <div class="choice-grid">
          ${item.options.map((option) => `
            <label class="choice">
              <input type="${inputType}" name="${item.id}" value="${escapeHtml(option)}"${describedBy}${nativeRequired} ${item.required ? "data-required-choice" : ""}>
              <span>${option}</span>
            </label>
          `).join("")}
        </div>
      </fieldset>
    `;
  }
  const autocomplete = {
    company_name: "organization",
    contact_name: "name",
    contact_email: "email",
    contact_phone: "tel"
  }[item.id];
  const autocompleteAttr = autocomplete ? ` autocomplete="${autocomplete}"` : "";
  const control = item.type === "textarea"
    ? `<textarea id="${item.id}" name="${item.id}"${describedBy} ${item.required ? "required" : ""}></textarea>`
    : `<input id="${item.id}" type="${item.type}" name="${item.id}"${describedBy}${autocompleteAttr} ${item.required ? "required" : ""}>`;
  return `<div class="field"><label for="${item.id}">${item.label}${required}</label>${help}${control}</div>`;
}

function renderResult() {
  const current = getCurrentBrief();
  app.innerHTML = `
    <section class="result">
      <div class="result-card">
        <div class="result-head">
          <div>
            <span class="tag">${current.title}</span>
            <h1>Спасибо,<br>бриф отправлен</h1>
            <p class="result-copy">Ответы сохранились у команды Serenity. Мы изучим задачу и вернёмся к вам по указанному контакту.</p>
          </div>
          <div class="result-actions">
            <button class="button secondary" type="button" data-action="edit">Вернуться к ответам</button>
            <button class="button" type="button" data-action="copy">Скопировать ответы</button>
          </div>
        </div>
        ${current.sections.map((sectionItem) => `
          <section class="summary-section">
            <h2>${sectionItem.title}</h2>
            <dl>
              ${sectionItem.fields.map((item) => `
                <div class="summary-item">
                  <dt>${item.label}</dt>
                  <dd class="${hasAnswer(item.id) ? "" : "empty"}">${hasAnswer(item.id) ? escapeHtml(formatAnswer(item.id)) : "Нет ответа"}</dd>
                </div>
              `).join("")}
            </dl>
          </section>
        `).join("")}
      </div>
    </section>
  `;
}

function getCurrentBrief() {
  return briefTypes.find((item) => item.id === state.briefId) || briefTypes[0];
}

function fillAnswers() {
  const form = document.querySelector("#brief-form");
  const answers = state.answers[state.briefId] || {};
  Object.entries(answers).forEach(([name, value]) => {
    const controls = form.elements[name];
    if (!controls) return;
    if (controls instanceof RadioNodeList) {
      [...controls].forEach((control) => {
        control.checked = Array.isArray(value) ? value.includes(control.value) : control.value === value;
      });
    } else if (controls.type === "checkbox") {
      controls.checked = Boolean(value);
    } else {
      controls.value = value;
    }
  });
}

function saveAnswers() {
  const form = document.querySelector("#brief-form");
  if (!form) return;
  const data = {};
  const formData = new FormData(form);
  for (const [key, value] of formData.entries()) {
    if (data[key]) {
      data[key] = Array.isArray(data[key]) ? [...data[key], value] : [data[key], value];
    } else {
      data[key] = value;
    }
  }
  state.answers[state.briefId] = data;
  const saved = writeStorage("serenityBriefAnswers", state.answers);
  updateProgress();
  setSaveStatus(saved ? "Черновик сохранён" : "Черновик только в этой вкладке", saved ? "" : "error");
}

function getRequiredProgress() {
  const requiredFields = getCurrentBrief().sections.flatMap((item) => item.fields).filter((item) => item.required);
  const requiredIds = [...requiredFields.map((item) => item.id), "privacy_consent"];
  const completed = requiredIds.filter(hasAnswer).length;
  return requiredIds.length ? Math.round((completed / requiredIds.length) * 100) : 100;
}

function updateProgress() {
  const progress = getRequiredProgress();
  const value = document.querySelector(".progress-label strong");
  const bar = document.querySelector(".progress span");
  if (value) value.textContent = `${progress}%`;
  if (bar) bar.style.width = `${progress}%`;
}

function readStorage(key) {
  try {
    return JSON.parse(localStorage.getItem(key) || "{}");
  } catch {
    return {};
  }
}

function writeStorage(key, value) {
  try {
    localStorage.setItem(key, JSON.stringify(value));
    return true;
  } catch {
    return false;
  }
}

function hasAnswer(id) {
  const value = state.answers[state.briefId]?.[id];
  return Array.isArray(value) ? value.length > 0 : Boolean(value?.trim?.());
}

function formatAnswer(id) {
  const value = state.answers[state.briefId]?.[id];
  return Array.isArray(value) ? value.join(", ") : value;
}

function makeTextSummary() {
  const current = getCurrentBrief();
  const lines = [`Бриф: ${current.title}`, ""];
  current.sections.forEach((sectionItem) => {
    lines.push(sectionItem.title.toUpperCase());
    sectionItem.fields.forEach((item) => {
      lines.push(`${item.label}: ${hasAnswer(item.id) ? formatAnswer(item.id) : "Нет ответа"}`);
    });
    lines.push("");
  });
  return lines.join("\n");
}

function makeSubmissionPayload() {
  const current = getCurrentBrief();
  const answers = state.answers[state.briefId] || {};

  return {
    submissionId: getSubmissionId(),
    briefId: current.id,
    briefTitle: current.title,
    submittedAt: new Date().toISOString(),
    companyName: answers.company_name || "",
    contactName: answers.contact_name || "",
    contactEmail: answers.contact_email || "",
    contactPhone: answers.contact_phone || "",
    contactSocial: answers.contact_social || "",
    request: answers.request || "",
    budget: answers.budget || "",
    privacyConsent: answers.privacy_consent === "accepted",
    consentAt: answers.privacy_consent === "accepted" ? new Date().toISOString() : "",
    formStartedAt: state.formStartedAt,
    honeypot: answers.company_site_confirm || "",
    sections: current.sections.map((sectionItem) => ({
      title: sectionItem.title,
      answers: sectionItem.fields.map((item) => ({
        question: item.label,
        answer: hasAnswer(item.id) ? formatAnswer(item.id) : ""
      }))
    })),
    summary: makeTextSummary()
  };
}

function getSubmissionId() {
  if (!state.submissionIds[state.briefId]) {
    state.submissionIds[state.briefId] = crypto.randomUUID
      ? crypto.randomUUID()
      : `${Date.now()}-${Math.random().toString(16).slice(2)}`;
    writeStorage("serenitySubmissionIds", state.submissionIds);
  }
  return state.submissionIds[state.briefId];
}

async function submitBrief() {
  const payload = makeSubmissionPayload();

  if (window.google?.script?.run) {
    return new Promise((resolve, reject) => {
      window.google.script.run
        .withSuccessHandler((result) => result?.ok ? resolve(result) : reject(new Error(result?.message || "Не удалось отправить бриф.")))
        .withFailureHandler(() => reject(new Error("Не удалось отправить бриф. Попробуйте ещё раз.")))
        .saveBrief(payload);
    });
  }

  const response = await fetch(publicConfig.submissionEndpoint, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });
  const result = await response.json().catch(() => ({}));
  if (!response.ok || !result?.ok) {
    throw new Error(result?.message || "Не удалось отправить бриф. Попробуйте ещё раз.");
  }
  return result;
}

function setSaveStatus(text, type = "") {
  if (!saveStatus) return;
  saveStatus.className = `autosave ${type}`.trim();
  saveStatus.innerHTML = `<i></i> ${escapeHtml(text)}`;
}

function escapeHtml(value) {
  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

document.addEventListener("click", async (event) => {
  const briefButton = event.target.closest("[data-brief]");
  const actionButton = event.target.closest("[data-action]");
  const scrollButton = event.target.closest("[data-scroll]");

  if (briefButton) {
    state.briefId = briefButton.dataset.brief;
    state.screen = "brief";
    updateUrl(state.briefId);
    render();
    window.scrollTo({ top: 0 });
  }

  if (scrollButton) {
    document.querySelector(`#${scrollButton.dataset.scroll}`)?.scrollIntoView({ behavior: "smooth" });
  }

  if (!actionButton) return;
  const action = actionButton.dataset.action;
  if (action === "home") {
    saveAnswers();
    state.screen = "home";
    updateUrl();
    render();
    window.scrollTo({ top: 0 });
  }
  if (action === "clear") {
    if (window.confirm("Очистить ответы в этом брифе?")) {
      state.answers[state.briefId] = {};
      delete state.submissionIds[state.briefId];
      writeStorage("serenityBriefAnswers", state.answers);
      writeStorage("serenitySubmissionIds", state.submissionIds);
      state.formStartedAt = Date.now();
      render();
    }
  }
  if (action === "edit") {
    state.screen = "brief";
    setSaveStatus("Черновик сохранён");
    updateUrl(state.briefId);
    render();
  }
  if (action === "copy") {
    try {
      await navigator.clipboard.writeText(makeTextSummary());
      actionButton.textContent = "Скопировано";
    } catch {
      actionButton.textContent = "Не удалось скопировать";
    }
    setTimeout(() => {
      actionButton.textContent = "Скопировать ответы";
    }, 1800);
  }
});

document.addEventListener("input", (event) => {
  if (!event.target.closest("#brief-form")) return;
  saveAnswers();
});

document.addEventListener("submit", async (event) => {
  if (event.target.id !== "brief-form") return;
  event.preventDefault();
  saveAnswers();
  const requiredChoices = [...event.target.querySelectorAll("[data-required-choice]")];
  const missingChoice = requiredChoices.find((item) => !event.target.querySelector(`[name="${item.name}"]:checked`));
  if (missingChoice) {
    const missingName = missingChoice.name;
    state.error = "Ответьте, пожалуйста, на обязательные вопросы.";
    render();
    const field = document.querySelector(`[name="${missingName}"]`)?.closest(".field");
    field?.scrollIntoView({ behavior: "smooth", block: "center" });
    field?.querySelector("input")?.focus({ preventScroll: true });
    return;
  }
  if (!event.target.reportValidity()) return;
  if (state.answers[state.briefId]?.company_site_confirm) return;

  state.sending = true;
  state.error = "";
  render();
  setSaveStatus("Отправляем бриф", "sending");
  try {
    state.submission = await submitBrief();
    state.sending = false;
    state.screen = "result";
    delete state.submissionIds[state.briefId];
    writeStorage("serenitySubmissionIds", state.submissionIds);
    setSaveStatus("Бриф отправлен", "sent");
    render();
    window.scrollTo({ top: 0, behavior: "smooth" });
  } catch (error) {
    state.sending = false;
    state.error = error.message;
    render();
    setSaveStatus("Черновик сохранён", "error");
    document.querySelector(".form-error")?.scrollIntoView({ behavior: "smooth", block: "center" });
  }
});

function updateUrl(briefId = "") {
  const url = new URL(window.location.href);
  if (briefId) {
    url.searchParams.set("brief", briefId);
  } else {
    url.searchParams.delete("brief");
  }
  window.history.replaceState({}, "", url);
}

render();
</script>
</body>
</html>
